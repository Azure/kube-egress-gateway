common:
  imageRepository: "local"
  imageTag: "test"
  gatewayLbProbePort: 8082

gatewayControllerManager:
  enabled: true
  # imageRepository: "local"
  imageName: "kube-egress-gateway-controller"
  # imageTag: ""
  imagePullPolicy: "IfNotPresent"
  replicas: 1
  leaderElect: "true"
  metricsBindPort: 8080
  healthProbeBindPort: 8081
  nodeSelector: {}
  tolerations: []

gatewayCNIManager:
  enabled: true
  # imageRepository: "local"
  imageName: "kube-egress-gateway-cnimanager"
  # imageTag: ""
  imagePullPolicy: "IfNotPresent"
  grpcServerPort: 50051
  # Cidrs that should bypass the egress gateway, e.g. intra-cluster traffic.
  # The two link-local entries below (Azure IMDS and AKS node-local DNS) are
  # node-local and must not be routed through the gateway VMSS; keep them
  # unless you have a specific reason to remove them.
  exceptionCidrs:
    - "169.254.169.254/32"
    - "169.254.10.11/32"
  cniConfigFileName: "01-egressgateway.conflist"
  cniUninstallConfigMapName: "cni-uninstall"
  cniUninstall: false
  nodeSelector:
    kubernetes.io/os: linux
  tolerations: []

gatewayDaemonManager:
  enabled: true
  # imageRepository: "local"
  imageName: "kube-egress-gateway-daemon"
  # imageTag: ""
  imagePullPolicy: "IfNotPresent"
  metricsBindPort: 8080
  healthProbeBindPort: 8081

gatewayDaemonManagerInit:
  # imageRepository: "local"
  imageName: "kube-egress-gateway-daemon-init"
  # imageTag: ""
  imagePullPolicy: "IfNotPresent"

gatewayCNI:
  # imageRepository: "local"
  imageName: "kube-egress-gateway-cni"
  # imageTag: ""
  imagePullPolicy: "IfNotPresent"

gatewayCNIIpam:
  # imageRepository: "local"
  imageName: "kube-egress-gateway-cni-ipam"
  # imageTag: ""
  imagePullPolicy: "IfNotPresent"

config:
  azureCloudConfig:
    cloud: "AzurePublicCloud"
    tenantId: ""
    subscriptionId: ""
    useManagedIdentityExtension: false
    userAssignedIdentityID: ""
    aadClientId: ""
    aadClientSecret: ""
    userAgent: "kube-egress-gateway-controller"
    resourceGroup: ""
    location: ""
    gatewayLoadBalancerName: "kubeegressgateway-ilb"
    loadBalancerResourceGroup: ""
    vnetName: ""
    vnetResourceGroup: ""
    subnetName: ""
